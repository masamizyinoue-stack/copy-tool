<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一孔確認ツール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf8f5;
  --bg2:#ffffff;
  --bg3:#f0ece6;
  --bg4:#e8e2d9;
  --text:#2d2a26;
  --text2:#6b6560;
  --text3:#a39d96;
  --bd:rgba(100,80,60,.12);
  --bd2:rgba(100,80,60,.22);
  --brown:#8b6f47;
  --brownbg:#f5ede3;
  --browntx:#5c4225;
  --teal:#2a7d6f;
  --tealbg:#e8f5f2;
  --tealtx:#1a5248;
  --rust:#c0533a;
  --rustbg:#faeee9;
  --rusttx:#7d2d1a;
  --gold:#b08a2e;
  --goldbg:#fdf4e0;
  --goldtx:#6b5218;
  --plum:#6b4f8a;
  --plumbg:#f0eaf8;
  --plumtx:#3d2556;
  --r:8px;--rl:14px;
  --shadow:0 2px 12px rgba(100,80,60,.10);
  --shadow-sm:0 1px 4px rgba(100,80,60,.08);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;min-height:100vh;line-height:1.6;}

/* タブバー */
.tab-bar{display:flex;background:var(--bg2);border-bottom:2px solid var(--bd2);position:sticky;top:0;z-index:20;box-shadow:var(--shadow-sm);}
.tab-btn{padding:14px 28px;font-size:15px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700;}

/* 保存バー */
.save-bar{background:var(--brownbg);border-bottom:1px solid var(--bd);padding:8px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.save-info{font-size:12px;color:var(--text3);}
.save-info span{color:var(--teal);font-weight:700;}
.save-btns{display:flex;gap:8px;}
.btn-save{padding:7px 18px;font-size:13px;font-weight:700;border:2px solid var(--teal);border-radius:var(--r);background:var(--teal);color:#fff;cursor:pointer;transition:all .2s;}
.btn-save:hover{background:var(--tealtx);border-color:var(--tealtx);}
.btn-clear{padding:7px 14px;font-size:13px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .2s;}
.btn-clear:hover{border-color:var(--rust);color:var(--rust);background:var(--rustbg);}

/* ページ */
.page{display:none;padding:18px 16px;}
.page.active{display:block;}

/* パターン追加エリア */
.add-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.add-header-line{flex:1;height:1px;background:var(--bd2);}
.add-header-txt{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap;padding:0 4px;}
.add-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:520px){.add-row{grid-template-columns:1fr;}}
.add-card{border:2px dashed var(--bd2);border-radius:var(--rl);cursor:pointer;overflow:hidden;background:var(--bg2);transition:all .2s;box-shadow:var(--shadow-sm);}
.add-card:hover{border-style:solid;transform:translateY(-2px);box-shadow:var(--shadow);}
.add-card:active{transform:translateY(0);box-shadow:var(--shadow-sm);}
.add-card-img{width:100%;height:auto;display:block;background:#fff;}
.add-card-foot{padding:10px 12px;}
.add-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.add-card-label{font-size:16px;font-weight:700;}
.add-plus-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300;transition:transform .2s;}
.add-card:hover .add-plus-badge{transform:rotate(90deg);}
.add-card-guide{font-size:12px;color:var(--text2);margin-bottom:2px;}
.add-card-note{font-size:11px;color:var(--text3);}

/* 上り（テール系） */
.add-card-0{border-color:rgba(42,125,111,.3);}
.add-card-0:hover{border-color:var(--teal);background:var(--tealbg);}
.add-card-0 .add-card-label{color:var(--teal);}
.add-card-0 .add-plus-badge{background:var(--tealbg);color:var(--teal);border:1px solid rgba(42,125,111,.3);}
/* 下り① （ブラウン系） */
.add-card-1{border-color:rgba(139,111,71,.3);}
.add-card-1:hover{border-color:var(--brown);background:var(--brownbg);}
.add-card-1 .add-card-label{color:var(--brown);}
.add-card-1 .add-plus-badge{background:var(--brownbg);color:var(--brown);border:1px solid rgba(139,111,71,.3);}
/* 下り② （ラスト系） */
.add-card-2{border-color:rgba(192,83,58,.3);}
.add-card-2:hover{border-color:var(--rust);background:var(--rustbg);}
.add-card-2 .add-card-label{color:var(--rust);}
.add-card-2 .add-plus-badge{background:var(--rustbg);color:var(--rust);border:1px solid rgba(192,83,58,.3);}

/* カード */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);position:relative;}
.card-top-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rl) var(--rl) 0 0;}
.cs-0{background:linear-gradient(90deg,var(--teal),rgba(42,125,111,.3));}
.cs-1{background:linear-gradient(90deg,var(--brown),rgba(139,111,71,.3));}
.cs-2{background:linear-gradient(90deg,var(--rust),rgba(192,83,58,.3));}
.pat-hdr{display:flex;justify-content:space-between;align-items:center;margin:6px 0 12px;gap:8px;flex-wrap:wrap;}
.pat-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pat-no{font-size:12px;font-weight:700;color:var(--text3);background:var(--bg3);border-radius:5px;padding:2px 10px;letter-spacing:.05em;}
.bsm{font-size:13px;padding:3px 12px;border-radius:20px;display:inline-block;font-weight:700;}
.bup{background:var(--tealbg);color:var(--tealtx);}
.bd1{background:var(--brownbg);color:var(--browntx);}
.bd2c{background:var(--rustbg);color:var(--rusttx);}
.pat-note-sm{font-size:11px;color:var(--text3);}
.btn-del{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid var(--bd2);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;}
.btn-del:hover{border-color:var(--rust);color:var(--rust);background:var(--rustbg);}

/* メモ */
.memo-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:8px 12px;background:var(--bg3);border-radius:var(--r);}
.memo-lbl{font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;background:var(--bg4);border-radius:4px;padding:2px 8px;}
.memo-inp{flex:1;padding:4px 6px;font-size:14px;border:none;border-bottom:2px solid var(--bd2);background:transparent;color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:border-color .2s;}
.memo-inp:focus{outline:none;border-bottom-color:var(--teal);}
.memo-inp::placeholder{color:var(--text3);}

/* 2カラム */
.lay2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
@media(max-width:620px){.lay2{grid-template-columns:1fr;}}
.dia-box{border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);box-shadow:var(--shadow-sm);}
.dia-box img{width:100%;height:auto;display:block;}
.inp-side{display:flex;flex-direction:column;gap:12px;}

/* 結果 */
.res-blk{display:flex;flex-direction:column;gap:6px;}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--r);position:relative;}
.xrow{background:var(--tealbg);border:1px solid rgba(42,125,111,.25);}
.yrow{background:var(--goldbg);border:1px solid rgba(176,138,46,.25);}
.xprow{background:var(--bg3);border:1px solid var(--bd);}
.res-lhs{display:flex;align-items:baseline;gap:10px;}
.rsym{font-size:24px;font-weight:700;line-height:1;}
.rsym-x{color:var(--teal);}
.rsym-y{color:var(--gold);}
.rsym-xp{color:var(--text2);font-size:16px;}
.rdesc{font-size:11px;color:var(--text2);}
.rval{font-size:26px;font-weight:700;letter-spacing:-.02em;}
.rval-x{color:var(--teal);}
.rval-y{color:var(--gold);}
.rval-xp{color:var(--text);font-size:17px;font-weight:500;}
.runit{font-size:12px;color:var(--text3);margin-left:3px;}

/* 入力セクション */
.isec{background:var(--bg3);border-radius:var(--r);padding:12px 14px;}
.stit{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:6px;}
.stit::before{content:'';display:inline-block;width:3px;height:12px;border-radius:2px;background:var(--brown);}
.flds{display:grid;gap:9px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.flbl{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.flbl .sym{font-size:16px;font-weight:700;}
input[type=number]{width:100%;padding:8px 10px;font-size:16px;font-weight:500;border:1.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--text);-moz-appearance:textfield;transition:border-color .15s,box-shadow .15s;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,125,111,.12);}
input:disabled{opacity:.45;cursor:not-allowed;background:var(--bg4);}

/* 内訳 */
.det-btn{font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;padding:3px 0;text-align:left;transition:color .15s;}
.det-btn:hover{color:var(--teal);}
.det-panel{margin-top:8px;border-top:1px solid var(--bd);padding-top:10px;display:none;}
.det-panel.open{display:block;}
.sgrid{display:grid;gap:6px;}
.si{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--r);padding:6px 10px;border:1px solid var(--bd);}
.si .sn{font-weight:700;color:var(--text);display:block;margin-bottom:3px;font-size:13px;}
.svals{display:flex;gap:12px;flex-wrap:wrap;}

/* 結果シート */
.rsheet{padding:18px 16px;}
.rsheet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.rsheet-hdr h2{font-size:20px;font-weight:700;color:var(--text);}
.btn-xl{padding:8px 20px;font-size:14px;font-weight:700;border:2px solid var(--teal);border-radius:var(--r);background:var(--teal);color:#fff;cursor:pointer;transition:all .2s;}
.btn-xl:hover{background:var(--tealtx);border-color:var(--tealtx);}

/* 凡例 */
.legend-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow-sm);}
.legend-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;}
.legend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:520px){.legend-grid{grid-template-columns:1fr;}}
.legend-item{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;background:var(--bg3);}
.legend-item img{width:100%;height:auto;display:block;}
.legend-item-body{padding:7px 10px;display:flex;align-items:center;gap:8px;background:var(--bg2);}

/* テーブル */
.rtblw{overflow-x:auto;border-radius:var(--rl);box-shadow:var(--shadow-sm);}
.rtbl{width:100%;border-collapse:collapse;font-size:14px;background:var(--bg2);min-width:800px;}
.rtbl thead tr{background:var(--bg3);}
.rtbl th{padding:11px 14px;text-align:left;font-weight:700;font-size:12px;color:var(--text2);border-bottom:2px solid var(--bd2);white-space:nowrap;}
.rtbl td{padding:10px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.rtbl tr:last-child td{border-bottom:none;}
.rtbl tr:hover td{background:var(--bg3);}
.bign{font-size:18px;font-weight:700;}
.xn{color:var(--teal);}
.yn{color:var(--gold);}
.xpn{color:var(--text2);}
.tc{font-size:12px;color:var(--text3);white-space:nowrap;}
.memo-cell{font-size:13px;color:var(--text2);max-width:140px;}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:14px;}

/* トースト */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== X・Y 結果フラッシュアニメーション ===== */
@keyframes flash-x {
  0%   { background:var(--tealbg); border-color:rgba(42,125,111,.25); box-shadow:none; }
  20%  { background:#c8f0e8; border-color:var(--teal); box-shadow:0 0 0 4px rgba(42,125,111,.25), 0 0 20px rgba(42,125,111,.3); }
  50%  { background:#e0f8f2; border-color:var(--teal); box-shadow:0 0 0 6px rgba(42,125,111,.18), 0 0 28px rgba(42,125,111,.25); }
  75%  { background:#d4f4ed; border-color:var(--teal); box-shadow:0 0 0 3px rgba(42,125,111,.15); }
  100% { background:var(--tealbg); border-color:rgba(42,125,111,.25); box-shadow:none; }
}
@keyframes flash-y {
  0%   { background:var(--goldbg); border-color:rgba(176,138,46,.25); box-shadow:none; }
  20%  { background:#fdefc4; border-color:var(--gold); box-shadow:0 0 0 4px rgba(176,138,46,.25), 0 0 20px rgba(176,138,46,.3); }
  50%  { background:#fef6d8; border-color:var(--gold); box-shadow:0 0 0 6px rgba(176,138,46,.18), 0 0 28px rgba(176,138,46,.25); }
  75%  { background:#fdf0c8; border-color:var(--gold); box-shadow:0 0 0 3px rgba(176,138,46,.15); }
  100% { background:var(--goldbg); border-color:rgba(176,138,46,.25); box-shadow:none; }
}
@keyframes pop-num {
  0%   { transform:scale(1); }
  35%  { transform:scale(1.18); }
  65%  { transform:scale(.96); }
  100% { transform:scale(1); }
}
.xrow.flash { animation: flash-x .9s ease-out forwards; }
.yrow.flash { animation: flash-y .9s ease-out forwards; }
.xrow.flash .rv-x,
.xrow.flash .rsym-x { animation: pop-num .5s cubic-bezier(.34,1.56,.64,1) forwards; }
.yrow.flash .rv-y,
.yrow.flash .rsym-y { animation: pop-num .5s cubic-bezier(.34,1.56,.64,1) .08s forwards; }


/* ===== 入力完了後の太枠 ===== */
.xrow.done { border:3px solid var(--teal) !important; box-shadow:0 0 0 3px rgba(42,125,111,.15); }
.yrow.done { border:3px solid var(--gold) !important; box-shadow:0 0 0 3px rgba(176,138,46,.15); }

</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-input" onclick="showTab('input')">入力</button>
  <button class="tab-btn" id="tab-result" onclick="showTab('result')">結果まとめ</button>
</div>
<div class="save-bar">
  <span class="save-info" id="save-info">未保存</span>
  <div class="save-btns">
    <button class="btn-clear" onclick="clearData()">データ消去</button>
    <button class="btn-save" onclick="saveData()">上書き保存</button>
  </div>
</div>

<div class="page active" id="page-input">
  <div id="patterns-wrap"></div>
  
<div class="add-header">
  <span class="add-header-line"></span>
  <span class="add-header-txt">▼ タップしてパターンを追加</span>
  <span class="add-header-line"></span>

    var el=document.querySelector('[data-pid="'+id+'"][data-idx="0"]');
    if(el){el.focus();el.select();}
    var cards=document.querySelectorAll('.card');
    if(cards.length)cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}
function removePattern(id){patterns=patterns.filter(function(p){return p.id!==id;});renderAll();}
function updMemo(id,v){var p=getP(id);if(p)p.memo=v;}
function upd(id,f,v){
  var p=getP(id);if(!p)return;
  p[f]=parseFloat(v)||0;
  if(p.ti===2) p.D=calcD(p);
  rerenderRes(id);
}
function onEnter(e,pid,idx){
  if(e.key!=='Enter')return;
  e.preventDefault();
  var cur=e.target;
  upd(pid,cur.getAttribute('data-field'),cur.value);
  var next=document.querySelector('[data-pid="'+pid+'"][data-idx="'+(idx+1)+'"]');
  if(next){next.focus();next.select();}
  else{
    var p=getP(pid);if(p)p.doneAt=new Date();
    // 最終入力確定 → フラッシュ＋太枠
    var resEl=document.getElementById('res_'+pid);
    if(resEl){
      var xrow=resEl.querySelector('.xrow');
      var yrow=resEl.querySelector('.yrow');
      if(xrow){xrow.classList.remove('flash');void xrow.offsetWidth;xrow.classList.add('flash');xrow.classList.add('done');}
      if(yrow){
        setTimeout(function(){yrow.classList.remove('flash');void yrow.offsetWidth;yrow.classList.add('flash');yrow.classList.add('done');},120);
      }
    }
    cur.blur();
  }
}
function getP(id){return patterns.find(function(p){return p.id===id;});}
function calcD(p){
  if(p.a<=0||p.H<=0) return 0;
  var c=Math.sqrt(p.a*p.a+p.b*p.b);
  var sinT=p.b/c;
  return p.C + p.H*sinT;
}
function calc(p){
  var a=p.a,b=p.b;
  if(a<=0)return{c:'0.0',X:'0.0',Xp:'0.0',Y:'0.0',subs:[],D:0};
  var c=Math.sqrt(a*a+b*b),cosT=a/c,sinT=b/c,mul=c/a;
  var A=p.A,B=p.B,C=p.C,S=p.S,D=p.D,X,Y;
  var ba=b/a;
  if(p.ti===0){X=A*cosT+(B+C)+S*sinT;Y=S*cosT-A*sinT-(B+C)*ba;}
  else if(p.ti===1){X=A*cosT+(B+C)-S*sinT;Y=S*cosT+A*sinT+(B+C)*ba;}
  else{X=A*cosT+(B+D)-S*sinT;Y=S*cosT+A*sinT+(B+D)*ba;}
  var Xp=X-B;
  var subs=p.ti===2
    ?[{n:'H',a:p.H,b:p.H*(b/a),c:p.H*mul},{n:'B+C',a:B+C,b:(B+C)*(b/a),c:(B+C)*mul},
      {n:'①B+D',a:B+D,b:(B+D)*(b/a),c:(B+D)*mul},{n:'②S',a:S,b:S*(b/a),c:S*mul},{n:'③X',a:X,b:X*(b/a),c:X*mul}]
    :[{n:'①B+C',a:B+C,b:(B+C)*(b/a),c:(B+C)*mul},{n:'②S',a:S,b:S*(b/a),c:S*mul},{n:'③X',a:X,b:X*(b/a),c:X*mul}];
  return{c:c.toFixed(1),X:X.toFixed(1),Xp:Xp.toFixed(1),Y:Y.toFixed(1),subs:subs,D:D};
}
function fmtT(d){
  if(!d)return'—';
  function p(n){return String(n).padStart(2,'0');}
  return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
function rerenderRes(id){
  var p=getP(id);if(!p)return;
  var r=calc(p),el=document.getElementById('res_'+id);if(!el)return;
  var prevX=el.querySelector('.rv-x').textContent;
  var prevY=el.querySelector('.rv-y').textContent;
  el.querySelector('.rv-x').textContent=r.X;
  el.querySelector('.rv-y').textContent=r.Y;
  el.querySelector('.rv-xp').textContent=r.Xp;
  el.querySelector('.rv-c').value=r.c;
  if(p.ti===2){var dEl=el.querySelector('.rv-D');if(dEl)dEl.value=p.D?p.D.toFixed(1):'0.0';}
  // 再入力時は太枠リセットのみ（フラッシュはしない）
  if(r.X!==prevX){
    var xrow=el.querySelector('.xrow');
    if(xrow) xrow.classList.remove('flash','done');
  }
  if(r.Y!==prevY){
    var yrow=el.querySelector('.yrow');
    if(yrow) yrow.classList.remove('flash','done');
  }
}
function buildFG(label,sym,color,val,pid,idx,field,disabled){
  var fg=document.createElement('div');fg.className='fg';
  var lbl=document.createElement('label');lbl.className='flbl';
  var sp=document.createElement('span');sp.className='sym';sp.style.color=color;sp.textContent=sym;
  var sub=document.createElement('span');sub.style.fontSize='12px';sub.style.color='var(--text3)';sub.textContent=label;
  lbl.appendChild(sp);lbl.appendChild(sub);
  var inp=document.createElement('input');inp.type='number';inp.value=val;inp.step='0.1';
  if(disabled){
    inp.disabled=true;
  }else{
    inp.setAttribute('data-pid',pid);inp.setAttribute('data-idx',idx);inp.setAttribute('data-field',field);
    inp.addEventListener('input',function(){upd(pid,field,this.value);});
    inp.addEventListener('keydown',function(e){onEnter(e,pid,idx);});
  }
  fg.appendChild(lbl);fg.appendChild(inp);return fg;
}
function renderAll(){
  var wrap=document.getElementById('patterns-wrap');wrap.innerHTML='';
  patterns.forEach(function(p,idx){
    var r=calc(p),t=TYPES[p.ti],hasH=(p.ti===2);
    var card=document.createElement('div');card.className='card';
    var stripe=document.createElement('div');stripe.className='card-top-stripe '+t.cs;
    card.appendChild(stripe);
    // ヘッダー
    var hdr=document.createElement('div');hdr.className='pat-hdr';
    var left=document.createElement('div');left.className='pat-left';
    var noSp=document.createElement('span');noSp.className='pat-no';noSp.textContent='No.'+String(idx+1).padStart(2,'0');
    var badge=document.createElement('span');badge.className='bsm '+t.badge;badge.textContent=t.label;
    var nSm=document.createElement('span');nSm.className='pat-note-sm';nSm.textContent=t.note;
    left.appendChild(noSp);left.appendChild(badge);left.appendChild(nSm);
    var delBtn=document.createElement('button');delBtn.className='btn-del';delBtn.textContent='削除';
    delBtn.addEventListener('click',function(){removePattern(p.id);});
    hdr.appendChild(left);hdr.appendChild(delBtn);card.appendChild(hdr);
    // メモ
    var mr=document.createElement('div');mr.className='memo-row';
    var ml=document.createElement('span');ml.className='memo-lbl';ml.textContent='メモ';
    var mi=document.createElement('input');mi.type='text';mi.className='memo-inp';
    mi.placeholder='部材名・符号など自由に入力';mi.value=p.memo||'';
    mi.addEventListener('input',function(){updMemo(p.id,this.value);});
    mr.appendChild(ml);mr.appendChild(mi);card.appendChild(mr);
    // 2カラム
    var lay=document.createElement('div');lay.className='lay2';
    var dia=document.createElement('div');dia.className='dia-box';
    var img=document.createElement('img');img.src=IMGS[p.ti];img.alt=t.label;dia.appendChild(img);
    var side=document.createElement('div');side.className='inp-side';side.id='res_'+p.id;
    // 結果
    var rb=document.createElement('div');rb.className='res-blk';
    function mRR(cls,sc,sym,desc,vc,vi,val,unit){
      var row=document.createElement('div');row.className='res-row '+cls;
      var lhs=document.createElement('div');lhs.className='res-lhs';
      var se=document.createElement('span');se.className='rsym '+sc;se.textContent=sym;
      var de=document.createElement('span');de.className='rdesc';de.textContent=desc;
      lhs.appendChild(se);lhs.appendChild(de);
      var rhs=document.createElement('span');
      var ve=document.createElement('span');ve.className='rval '+vc+' '+vi;ve.textContent=val;
      var ue=document.createElement('span');ue.className='runit';ue.textContent=unit;
      rhs.appendChild(ve);rhs.appendChild(ue);row.appendChild(lhs);row.appendChild(rhs);return row;
    }
    rb.appendChild(mRR('xrow','rsym-x','X','梁天端/梁芯','rval-x','rv-x',r.X,'mm'));
    rb.appendChild(mRR('yrow','rsym-y','Y','梁天端/梁芯','rval-y','rv-y',r.Y,'mm'));
    rb.appendChild(mRR('xprow','rsym-xp',"X'",'（X − B）','rval-xp','rv-xp',r.Xp,'mm'));
    side.appendChild(rb);
    // 勾配
    var s1=document.createElement('div');s1.className='isec';
    var st1=document.createElement('div');st1.className='stit';st1.textContent='基本勾配';s1.appendChild(st1);
    var g1=document.createElement('div');g1.className='flds';g1.style.gridTemplateColumns='1fr 1fr 1fr';
    g1.appendChild(buildFG('水平','a','var(--teal)',p.a,p.id,0,'a',false));
    g1.appendChild(buildFG('垂直','b','var(--gold)',p.b,p.id,1,'b',false));
    var cFg=buildFG('斜辺（自動）','c','var(--plum)',r.c,p.id,-1,'c',true);
    cFg.querySelector('input').classList.add('rv-c');g1.appendChild(cFg);
    s1.appendChild(g1);side.appendChild(s1);
    // 寸法
    var s2=document.createElement('div');s2.className='isec';
    var st2=document.createElement('div');st2.className='stit';st2.textContent='各寸法（mm）';s2.appendChild(st2);
    var g2=document.createElement('div');g2.className='flds';g2.style.gridTemplateColumns='1fr 1fr';
    var dd=[{sym:'A',lbl:'端明き',col:'var(--teal)',f:'A'},{sym:'B',lbl:'FLG半分',col:'var(--brown)',f:'B'},
            {sym:'C',lbl:'クリア',col:'var(--gold)',f:'C'},{sym:'S',lbl:'下がり',col:'var(--rust)',f:'S'}];
    if(hasH)dd.push({sym:'H',lbl:'梁成',col:'var(--plum)',f:'H'});
    dd.forEach(function(d,fi){g2.appendChild(buildFG(d.lbl,d.sym,d.col,p[d.f],p.id,fi+2,d.f,false));});
    if(hasH){
      var dFg=buildFG('下クリア（自動）','D','var(--gold)',r.D?r.D.toFixed(1):'0.0',p.id,-1,'D',true);
      dFg.querySelector('input').classList.add('rv-D');
      g2.appendChild(dFg);
    }
    s2.appendChild(g2);side.appendChild(s2);
    // 内訳
    var db=document.createElement('button');db.className='det-btn';db.textContent='▶ 内訳を表示';
    db.addEventListener('click',function(){toggleDetail(p.id);});side.appendChild(db);
    var dp=document.createElement('div');dp.className='det-panel';dp.id='det-'+p.id;
    var dt=document.createElement('div');dt.className='stit';dt.style.marginBottom='6px';
    dt.textContent='内訳（a=元寸法　b=勾配Y成分　c=斜辺換算）';dp.appendChild(dt);
    var sg=document.createElement('div');sg.className='sgrid';sg.style.gridTemplateColumns='repeat('+r.subs.length+',1fr)';
    r.subs.forEach(function(s){
      var si=document.createElement('div');si.className='si';
      var sn=document.createElement('span');sn.className='sn';sn.textContent=s.n;
      var sv=document.createElement('div');sv.className='svals';
      sv.innerHTML='<span>a: <b>'+s.a.toFixed(1)+'</b></span><span>b: <b>'+s.b.toFixed(1)+'</b></span><span>c: <b>'+s.c.toFixed(1)+'</b></span>';
      si.appendChild(sn);si.appendChild(sv);sg.appendChild(si);
    });
    dp.appendChild(sg);side.appendChild(dp);
    lay.appendChild(dia);lay.appendChild(side);card.appendChild(lay);wrap.appendChild(card);
  });
}
function toggleDetail(id){
  var el=document.getElementById('det-'+id);if(!el)return;
  var open=el.classList.toggle('open');
  var btn=el.previousElementSibling;if(btn)btn.textContent=(open?'▼':'▶')+' 内訳を表示';
}
function renderResultSheet(){
  var wrap=document.getElementById('result-table-wrap');
  if(patterns.length===0){wrap.innerHTML='<div class="empty">まだパターンがありません。<br>入力タブでパターンを追加してください。</div>';return;}
  var bcls=['bup','bd1','bd2c'],rows='';
  patterns.forEach(function(p,i){
    var r=calc(p),hasH=(p.ti===2);
    rows+='<tr>'
      +'<td><b>No.'+String(i+1).padStart(2,'0')+'</b></td>'
      +'<td><span class="bsm '+bcls[p.ti]+'">'+TYPES[p.ti].label+'</span></td>'
      +'<td class="memo-cell">'+(p.memo?escH(p.memo):'<span style="color:var(--text3)">—</span>')+'</td>'
      +'<td>'+p.a+'</td><td>'+p.b+'</td><td>'+r.c+'</td>'
      +'<td>'+p.A+'</td><td>'+p.B+'</td><td>'+p.C+'</td><td>'+p.S+'</td>'
      +'<td>'+(hasH?p.H:'—')+'</td><td>'+(hasH&&r.D?r.D.toFixed(1):'—')+'</td>'
      +'<td class="bign xn">'+r.X+'</td><td class="bign yn">'+r.Y+'</td>'
      +'<td class="xpn">'+r.Xp+'</td><td class="tc">'+fmtT(p.doneAt)+'</td>'
      +'</tr>';
  });
  wrap.innerHTML='<table class="rtbl"><thead><tr>'
    +'<th>No.</th><th>種別</th><th>メモ</th>'
    +'<th>a</th><th>b</th><th>c</th>'
    +'<th>A</th><th>B</th><th>C</th><th>S</th><th>H</th><th>D</th>'
    +'<th style="color:var(--teal)">X（mm）</th><th style="color:var(--gold)">Y（mm）</th>'
    +"<th>X'（mm）</th><th>完了時刻</th>"
    +'</tr></thead><tbody>'+rows+'</tbody></table>';
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function exportExcel(){
  if(patterns.length===0){alert('パターンがありません。');return;}
  var headers=['No.','種別','メモ','a','b','c','A','B','C','S','H','D','X(mm)','Y(mm)',"X'(mm)",'完了時刻'];
  var data=[headers];
  patterns.forEach(function(p,i){
    var r=calc(p),hasH=(p.ti===2);
    data.push(['No.'+String(i+1).padStart(2,'0'),TYPES[p.ti].label,p.memo||'',
      p.a,p.b,parseFloat(r.c),p.A,p.B,p.C,p.S,
      hasH?p.H:'',hasH&&r.D?parseFloat(r.D.toFixed(1)):'',
      parseFloat(r.X),parseFloat(r.Y),parseFloat(r.Xp),fmtT(p.doneAt)]);
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:8},{wch:8},{wch:20},{wch:7},{wch:7},{wch:9},
    {wch:7},{wch:7},{wch:7},{wch:7},{wch:7},{wch:9},{wch:9},{wch:9},{wch:9},{wch:22}];
  XLSX.utils.book_append_sheet(wb,ws,'第一孔確認');
  function p(n){return String(n).padStart(2,'0');}
  var now=new Date();
  XLSX.writeFile(wb,'第一孔確認_'+now.getFullYear()+p(now.getMonth()+1)+p(now.getDate())+'_'+p(now.getHours())+p(now.getMinutes())+'.xlsx');
  showToast('Excelを保存しました');
}
window.addEventListener('DOMContentLoaded',function(){
  var loaded=loadData();renderAll();updateSaveInfo();
  if(loaded&&patterns.length>0)showToast('前回のデータを読み込みました（'+patterns.length+'件）');
});
</script>
