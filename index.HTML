<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Copy Tool v7</title>
<style>
    :root {
        --primary: #2563eb;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --border: #e2e8f0;
        /* スターマーク用の色 */
        --star-active-bg: #fef9c3; /* 薄い黄色 */
        --star-active-border: #facc15; /* 濃い黄色 */
    }

    body { 
        font-family: 'Helvetica Neue', Arial, sans-serif; 
        background: var(--bg); 
        color: var(--text-main);
        margin: 0; padding: 20px; 
    }

    .header-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
    }

    h2 { 
        font-size: 1.4rem; 
        border-left: 6px solid var(--primary); 
        padding-left: 12px; 
        margin: 0;
    }

    /* 登録エリアの折りたたみ設定 */
    #editorPanel {
        display: none; /* 初期状態は非表示 */
        background: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        margin-bottom: 25px;
        border: 1px solid var(--border);
    }

    .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    
    textarea { 
        width: 100%; height: 100px; padding: 12px; 
        border: 1px solid var(--border); border-radius: 8px; 
        font-size: 14px; box-sizing: border-box; resize: vertical;
    }

    .input-field { 
        flex: 1; min-width: 200px; padding: 10px; 
        border: 1px solid var(--border); border-radius: 8px; 
    }

    /* ボタン共通 */
    .btn {
        padding: 10px 20px; border: none; border-radius: 8px; 
        cursor: pointer; font-weight: bold; transition: 0.2s;
        font-size: 14px;
    }
    
    /* 登録パネル用ボタン */
    .btn-save { background: var(--primary); color: white; }
    .btn-save:hover { opacity: 0.9; }
    .btn-cancel { background: #94a3b8; color: white; margin-left: auto; }

    /* ヘッダーの「＋新規登録」ボタン */
    .btn-toggle {
        background: var(--primary);
        color: white;
        padding: 8px 16px;
        border-radius: 20px;
    }
    .btn-toggle:hover { opacity: 0.9; }

    /* ツールバー（検索・ソート） */
    .toolbar {
        display: flex; flex-wrap: wrap; gap: 10px; 
        align-items: center; margin-bottom: 20px;
        background: #fff; padding: 10px; border-radius: 8px;
        border: 1px solid var(--border);
    }
    .search-input {
        padding: 8px 14px; width: 250px; border-radius: 20px;
        border: 1px solid var(--border); outline: none; font-size: 14px;
    }
    .sort-label { font-size: 14px; font-weight: bold; color: var(--text-main); margin-left: 10px; }
    
    /* ソートボタン（未選択） */
    .btn-sort {
        background: #fff; border: 1px solid #ccc; color: #666;
        padding: 6px 12px; font-size: 12px; font-weight: normal;
    }
    /* ソートボタン（選択中） */
    .btn-sort.active {
        background: #e0e7ff; border-color: var(--primary); color: var(--primary); font-weight: bold;
    }

    /* カードレイアウト */
    #container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .card {
        background: var(--card-bg);
        padding: 18px;
        border-radius: 12px;
        border: 1px solid var(--border);
        position: relative;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        display: flex;
        flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }

    /* ★ ピン留め状態のカードスタイル ★ */
    .card.is-pinned {
        background: var(--star-active-bg); /* 背景を黄色に */
        border: 2px solid var(--star-active-border); /* 枠線を濃い黄色に */
        box-shadow: 0 4px 6px rgba(250, 204, 21, 0.2); /* 黄色の影 */
    }

    /* ★ スターマークのデザイン調整 ★ */
    .pin-icon {
        position: absolute; top: 10px; right: 10px;
        cursor: pointer; 
        font-size: 28px; /* 大きく */
        line-height: 1;
        filter: grayscale(1); /* 通常は白黒 */
        opacity: 0.3;
        transition: 0.2s;
        z-index: 10;
    }
    .pin-icon:hover { opacity: 1; filter: grayscale(0); transform: scale(1.1); }
    
    /* ピン留め中のスター */
    .pin-icon.active { 
        filter: grayscale(0); /* カラーに */
        opacity: 1;
        text-shadow: 0 0 5px rgba(250, 204, 21, 0.5); /* 光らせる */
    }

    .tag-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; padding-right: 30px; /* スターと重ならないように */}
    .tag-item { 
        font-size: 11px; padding: 3px 8px; background: #eff6ff; 
        color: #1e40af; border-radius: 4px; border: 1px solid #dbeafe;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    /* ピン留めカード内のタグ色微調整 */
    .card.is-pinned .tag-item { background: #fff; }

    pre { 
        background: #f8fafc; padding: 12px; border-radius: 6px; 
        white-space: pre-wrap; font-size: 13px; line-height: 1.5;
        border: 1px solid #f1f5f9; margin: 0 0 15px 0;
        word-break: break-all; min-height: 40px;
        color: #111;
    }
    .card.is-pinned pre { background: rgba(255,255,255,0.6); border-color: #f1f5f9; }

    .card-footer { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 6px; margin-top: auto; }
    .footer-btn { padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; color: white; }
    .btn-copy { background: var(--success); font-weight: bold; }
    .btn-edit { background: var(--warning); }
    .btn-delete { background: var(--danger); }
    
    .copied { background: #065f46 !important; animation: pulse 0.3s; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
</style>
</head>

<body>

<div class="header-area">
    <h2>Smart Copy Tool</h2>
    <button class="btn btn-toggle" onclick="toggleEditor()">＋新規登録 / 編集パネル</button>
</div>

<div id="editorPanel">
    <div class="form-row">
        <textarea id="txtBody" placeholder="コピーしたい内容を入力（<file://> 等の記号、パス、複数行OK）"></textarea>
    </div>
    <div class="form-row">
        <input id="txtA" class="input-field" placeholder="任意① (件名・製品名など)">
        <input id="txtB" class="input-field" placeholder="任意② (管理番号・宛名など)">
        <input type="hidden" id="editIdx" value="-1">
        <button id="btnSubmit" class="btn btn-save" onclick="handleSave()">登録する</button>
        <button id="btnCancel" class="btn btn-cancel" onclick="forceCloseEditor()">パネルを閉じる</button>
    </div>
</div>

<div class="toolbar">
    <input id="searchBox" class="search-input" placeholder="キーワード検索..." oninput="draw()">
    <span class="sort-label">並び替え:</span>
    <button id="sortNew" class="btn btn-sort active" onclick="setSort('new')">新着順</button>
    <button id="sortName" class="btn btn-sort" onclick="setSort('name')">名前順</button>
</div>

<div id="container"></div>

<script>
    const STORAGE_KEY = "copy_tool_data_v7";
    let listData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentSortMode = 'new'; // 初期ソートモード

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(listData));
    }

    // 編集パネルの開閉
    function toggleEditor() {
        const panel = document.getElementById("editorPanel");
        const isHidden = window.getComputedStyle(panel).display === 'none';
        if (isHidden) {
            panel.style.display = 'block';
            document.getElementById("txtBody").focus();
        } else {
            // 編集モード中（editIdxが-1以外）なら、閉じる前にフォームをクリアする
            if(document.getElementById("editIdx").value !== "-1") {
                clearForm();
            }
            panel.style.display = 'none';
        }
    }

    // パネルを強制的に閉じる（キャンセルボタン用）
    function forceCloseEditor() {
        clearForm();
        document.getElementById("editorPanel").style.display = 'none';
    }

    // ソートモードの切り替え
    function setSort(mode) {
        currentSortMode = mode;
        // ボタンのスタイル更新
        document.getElementById("sortNew").classList.toggle('active', mode === 'new');
        document.getElementById("sortName").classList.toggle('active', mode === 'name');
        draw();
    }

    function handleSave() {
        const text = document.getElementById("txtBody").value;
        const a = document.getElementById("txtA").value;
        const b = document.getElementById("txtB").value;
        const editIdx = parseInt(document.getElementById("editIdx").value);

        if (!text && !a && !b) return;

        if (editIdx === -1) {
            // 新規登録
            listData.push({ text, a, b, pinned: false, ts: Date.now() });
        } else {
            // 上書き保存
            listData[editIdx] = { ...listData[editIdx], text, a, b };
        }

        saveToLocalStorage();
        clearForm();
        // 登録後はパネルを閉じる
        document.getElementById("editorPanel").style.display = 'none';
        draw();
    }

    function clearForm() {
        document.getElementById("txtBody").value = "";
        document.getElementById("txtA").value = "";
        document.getElementById("txtB").value = "";
        document.getElementById("editIdx").value = "-1";
        document.getElementById("btnSubmit").textContent = "登録する";
    }

    function draw() {
        const container = document.getElementById("container");
        const query = document.getElementById("searchBox").value.toLowerCase();
        
        // 検索とソート用にインデックス付きのコピーを作成
        let filtered = listData.map((d, i) => ({ ...d, originalIndex: i }));

        // 検索フィルタ
        if (query) {
            filtered = filtered.filter(d => 
                d.text.toLowerCase().includes(query) || 
                d.a.toLowerCase().includes(query) || 
                d.b.toLowerCase().includes(query)
            );
        }

        // ソート処理（最優先はピン留め）
        filtered.sort((a, b) => {
            // 1. ピン留め有無で比較
            if (a.pinned !== b.pinned) {
                return b.pinned - a.pinned; // true(1)が上、false(0)が下
            }
            // 2. ピン留め同士、または非ピン留め同士の中でのソート
            if (currentSortMode === 'name') {
                return a.text.localeCompare(b.text, 'ja');
            } else {
                return b.ts - a.ts; // 新着順（タイムスタンプが大きい順）
            }
        });

        container.innerHTML = "";

        if (filtered.length === 0) {
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8;">データがありません。「＋新規登録」から追加してください。</div>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement("div");
            // ピン留め状態なら専用のクラスを追加
            card.className = `card ${item.pinned ? 'is-pinned' : ''}`;

            // ピン（スター）アイコン
            const pin = document.createElement("div");
            pin.className = `pin-icon ${item.pinned ? 'active' : ''}`;
            pin.textContent = "⭐";
            pin.title = item.pinned ? "ピン留めを解除" : "一番上にピン留め";
            pin.onclick = (e) => {
                e.stopPropagation(); // カード自体のクリックイベント（もしあれば）を防ぐ
                listData[item.originalIndex].pinned = !listData[item.originalIndex].pinned;
                saveToLocalStorage();
                draw(); // 再描画
            };

            // 任意項目（タグ）
            const tags = document.createElement("div");
            tags.className = "tag-list";
            if(item.a) tags.innerHTML += `<div class="tag-item">① ${escapeText(item.a)}</div>`;
            if(item.b) tags.innerHTML += `<div class="tag-item">② ${escapeText(item.b)}</div>`;

            // 本文
            const pre = document.createElement("pre");
            pre.innerText = item.text;

            // フッターボタン群
            const footer = document.createElement("div");
            footer.className = "card-footer";

            const cpBtn = document.createElement("button");
            cpBtn.className = "footer-btn btn-copy";
            cpBtn.textContent = "コピー";
            cpBtn.onclick = () => {
                navigator.clipboard.writeText(item.text).then(() => {
                    cpBtn.textContent = "完了!";
                    cpBtn.classList.add("copied");
                    setTimeout(() => { 
                        cpBtn.textContent = "コピー"; 
                        cpBtn.classList.remove("copied"); 
                    }, 1000);
                });
            };

            const edBtn = document.createElement("button");
            edBtn.className = "footer-btn btn-edit";
            edBtn.textContent = "編集";
            edBtn.onclick = () => {
                // 編集データをフォームに入れてパネルを開く
                document.getElementById("txtBody").value = item.text;
                document.getElementById("txtA").value = item.a;
                document.getElementById("txtB").value = item.b;
                document.getElementById("editIdx").value = item.originalIndex;
                document.getElementById("btnSubmit").textContent = "上書き保存";
                
                // パネルを表示
                document.getElementById("editorPanel").style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById("txtBody").focus();
            };

            const deBtn = document.createElement("button");
            deBtn.className = "footer-btn btn-delete";
            deBtn.textContent = "削除";
            deBtn.onclick = () => {
                if(confirm("この項目を削除しますか？")) {
                    listData.splice(item.originalIndex, 1);
                    saveToLocalStorage();
                    draw();
                }
            };

            footer.append(cpBtn, edBtn, deBtn);
            card.append(pin, tags, pre, footer);
            container.appendChild(card);
        });
    }

    // HTMLエスケープ用（タグ表示の安全のため）
    function escapeText(str) {
        const p = document.createElement("p");
        p.textContent = str;
        return p.innerHTML;
    }

    // 初期描画
    draw();
</script>

</body>
</html>
